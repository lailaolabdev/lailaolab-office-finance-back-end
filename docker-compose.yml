services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: lailaolab-backend:latest
    container_name: lailaolab-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs

volumes:
  uploads:
  logs:
